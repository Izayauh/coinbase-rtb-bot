exchange: coinbase_advanced
portfolio_scope: trading_sleeve_v1

runtime:
  mode: paper          # paper | live  (live fails fast this phase)
  trading_enabled: true
  portfolio_value: 10000.0
  paper_db_path: paper_journal.db
  live_db_path: live_journal.db

symbols:
  - BTC-USD

timeframes:
  signal: 1h
  regime: 4h

risk:
  risk_per_trade: 0.0035
  reduced_risk_per_trade: 0.0020
  max_total_risk: 0.0070
  max_daily_loss: 0.015
  max_weekly_loss: 0.035
  shutdown_drawdown: 0.07

setup:
  breakout_lookback: 20
  breakout_volume_mult: 1.25
  breakout_rsi_min: 56
  breakout_rsi_max: 74
  retest_window_bars: 5
  continuation_chase_atr_max: 0.8

stops:
  atr_period: 14
  initial_stop_atr: 1.4
  retest_buffer_atr: 0.25
  runner_trail_atr: 1.8
  time_stop_bars: 12

execution:
  entry_order_type: limit_ioc
  max_entry_slippage_bps: 10
  max_spread_bps: 8
  reconcile_interval_sec: 5
  ws_stale_timeout_sec: 15
  max_pending_order_age_sec: 60

safety:
  # Hard kill switch — create a file named KILL_SWITCH in the repo root
  # to immediately block all order placement. Checked every reconcile tick.
  kill_switch_file: KILL_SWITCH

  # Product allowlist — only symbols in this list may be traded.
  product_allowlist:
    - BTC-USD

  # Order and position size caps (USD notional).
  # Orders exceeding max_order_size_usd are rejected before submission.
  # Fills that would push position above max_position_size_usd disable trading.
  max_order_size_usd: 500.0
  max_position_size_usd: 1000.0

  # Live trading gate. Both conditions must be true to run in live mode:
  #   1. This flag set to true in config
  #   2. Environment variable LIVE_TRADING_CONFIRMED=true
  # Paper mode ignores this flag entirely.
  live_trading_confirmed: false

# Live-mode order settings.
# Ignored entirely in paper mode.
live:
  # Fixed USD notional per order for first live validation.
  # Overrides normal risk-based sizing when > 0.
  # Set to 0.0 to revert to standard risk sizing after initial test.
  test_order_notional_usd: 10.0
